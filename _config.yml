title: Skrammz 365
description: > # this means to ignore newlines until "baseurl:"
  Hey Punk! Don't Lose Your Spunk.
permalink: ':title/'
remote_theme: sighingnow/jekyll-gitbook
baseurl: "/flexible-jekyll" # the subpath of your site, e.g. /blog
url: "https://skrammz.github.io/flexible-jekyll/" # the base hostname & protocol for your site, e.g. http://example.com
site-twitter: #if your site has a twitter account, enter it here

# Author Settings
author: Dez Biddle # add your name
author-img:  # add your photo
about-author: I am a web developer focusing on front-end development. Always hungry to keep learning. # add description
social-github: Skrammz # add your Github handle
social-instagram: DezIsCold # add your Linkedin handle

# Disqus
discus-identifier: mr-brown # add your discus identifier

# Tracker
analytics: # Google Analytics

# Build Settings
markdown: kramdown
plugins:
  - jekyll-sitemap
  - jekyll-paginate
  - jemoji

paginate: 8
paginate_path: "/page/:num"

exclude: ["node_modules", "gulpfile.js", "package.json", "yarn.lock"]
